<!DOCTYPE html>
<html>
<head>
    <title>All Events</title>
    <link rel="stylesheet" href="AllClickEventsForm.css">
</head>
<body>

<h2>All JavaScript Events Example</h2>

<!-- Mouse Events -->
<h3>Mouse Events</h3>
<button id="clickBtn">Click</button>
<button id="dblBtn">Double Click</button>
<button id="overBtn">Mouse Over</button>
<button id="outBtn">Mouse Out</button>
<button id="downBtn">Mouse Down</button>
<button id="upBtn">Mouse Up</button>
<button id="moveBtn">Mouse Move</button>
<button id="enterBtn">Mouse Enter</button>
<button id="leaveBtn">Mouse Leave</button>

<!-- Keyboard Events -->
<h3>Keyboard Events</h3>
<input type="text" id="keyInput" placeholder="Type something">

<!-- Form Events -->
<h3>Form Events</h3>
<form id="myForm">
    <input type="text" id="name" placeholder="Enter name">
    <button type="submit">Submit</button>
</form>

<!-- Window Events -->
<h3>Window Events</h3>
<button onclick="resizeWindow()">Resize Window</button>

<p id="msg">Event message will show here</p>

<script src="AllClickEventsForm.js"></script>
</body>
</html>
