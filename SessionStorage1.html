<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Session Storage Example</title>
    <link rel="stylesheet" href="SessionStorage1.css">
    <script src="SessionStorage1.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Session Storage Example</h1>
        <form id="profileForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            
            <button type="submit">Save</button>
        </form>
        
        <div class="buttons">
            <button id="retrieveBtn">Retrieve Data</button>
            <button id="clearBtn">Clear Data</button>
        </div>
    </div>

    <!-- Popup Modal -->
    <div id="popup" class="popup">
        <div class="popup-content">
            <span id="popupClose" class="popup-close">&times;</span>
            <div id="popupMessage"></div>
            <button id="popupOk" class="popup-btn">OK</button>
            <button id="popupYes" class="popup-btn">Yes</button>
            <button id="popupNo" class="popup-btn">No</button>
        </div>
    </div>
</body>
</html>
