<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Programs</title>

    <link rel="stylesheet" href="Conditional_statement.css">
</head>
<body>

    <div class="container">
        <h2>Senior Citizen</h2>

        <input type="number"
        id="age1"
        placeholder="Enter Age">

        <button id="btn1">
            Check
        </button>

        <h3 id="result1"></h3>
    </div>


    <div class="container">
        <h2>Leap Year</h2>

        <input type="number"
        id="year"
        placeholder="Enter Year">

        <button id="btn2">
            Check
        </button>

        <h3 id="result2"></h3>
    </div>


    <div class="container">
        <h2>Electricity Bill</h2>

        <input type="number"
        id="units"
        placeholder="Enter Units">

        <button id="btn3">
            Check
        </button>

        <h3 id="result3"></h3>
    </div>


    <div class="container">
        <h2>Ladies Quota</h2>

        <input type="text"
        id="gender"
        placeholder="Enter Gender">

        <input type="number"
        id="age2"
        placeholder="Enter Age">

        <button id="btn4">
            Check
        </button>

        <h3 id="result4"></h3>
    </div>


    <div class="container">
        <h2>User Type</h2>

        <input type="text"
        id="userType"
        placeholder="Enter User Type">

        <button id="btn5">
            Check
        </button>

        <h3 id="result5"></h3>
    </div>


    <div class="container">
        <h2>Fare Check</h2>

        <input type="number"
        id="age3"
        placeholder="Enter Age">

        <button id="btn6">
            Check
        </button>

        <h3 id="result6"></h3>
    </div>


    <div class="container">
        <h2>Seat Upgrade</h2>

        <input type="text"
        id="bookedClass"
        placeholder="Booked Class">

        <input type="number"
        id="seats"
        placeholder="Second AC Seats">

        <button id="btn7">
            Check
        </button>

        <h3 id="result7"></h3>
    </div>


    
    <div class="container">
        <h2>Waitlist</h2>

        <input type="number"
        id="waitlist"
        placeholder="Enter Waitlist">

        <button id="btn8">
            Check
        </button>

        <h3 id="result8"></h3>
    </div>


    <div class="container">
        <h2>Ticket Status</h2>

        <input type="text"
        id="status"
        placeholder="Enter Status">

        <button id="btn9">
            Check
        </button>

        <h3 id="result9"></h3>
    </div>


    
    <div class="container">
        <h2>Quota</h2>

        <input type="text"
        id="quota"
        placeholder="Enter Quota">

        <button id="btn10">
            Check
        </button>

        <h3 id="result10"></h3>
    </div>


    <div class="container">
        <h2>Grade</h2>

        <input type="number"
        id="marks"
        placeholder="Enter Marks">

        <button id="btn11">
            Check
        </button>

        <h3 id="result11"></h3>
    </div>

    <script src="Conditional_statement.js"></script>

</body>
</html>
