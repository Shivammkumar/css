<!DOCTYPE html>
<html>
<head>
    <title>Calculation Programs</title>
    <link rel="stylesheet" href="simple.css">
</head>

<body>

    <h1>JavaScript Calculation Programs</h1>

    <div class="box">
        <h2>1. Discount Price</h2>

        <input type="number" id="price" placeholder=" Price">
        <input type="number" id="discount1" placeholder="First Discount %">
        <input type="number" id="discount2" placeholder="Second Discount %">

        <button id="btn1">Calculate</button>
        <p id="result1"></p>
        
    </div>


    <div class="box">
        <h2>2. Unit Price</h2>

        <input type="number" id="totalCost" placeholder="Enter Total Cost">
        <input type="number" id="quantity" placeholder="Enter Quantity">

        <button id="btn2">Calculate</button>
        <p id="result2"></p>
    </div>

    <div class="box">
        <h2>3. Room Service Charge</h2>

        <input type="number" id="food" placeholder="Food Cost">
        <input type="number" id="beverages" placeholder="Beverages Cost">
        <input type="number" id="snacks" placeholder="Snacks Cost">

        <button id="btn3">Calculate</button>
        <p id="result3"></p>
    </div>

    <div class="box">
        <h2>4. Room Booking Earnings</h2>

        <input type="number" id="room1" placeholder="Room 1 Earnings">
        <input type="number" id="room2" placeholder="Room 2 Earnings">
        <input type="number" id="room3" placeholder="Room 3 Earnings">

        <button id="btn4">Calculate</button>
        <p id="result4"></p>
    </div>

    <div class="box">
        <h2>5. Event Hosting Cost</h2>

        <input type="number" id="attendees" placeholder="No. of Attendees">
        <input type="number" id="chargePerPerson" placeholder="Charge Per Person">

        <button id="btn5">Calculate</button>
        <p id="result5"></p>
    </div>

    <div class="box">
        <h2>6. Parking Cost</h2>

        <input type="number" id="days" placeholder="Enter Days">
        <input type="number" id="parkingPerDay" placeholder="Parking Per Day">

        <button id="btn6">Calculate</button>
        <p id="result6"></p>
    </div>

    <div class="box">
        <h2>7. Library Membership Fees</h2>

        <input type="number" id="members" placeholder="No. of Members">
        <input type="number" id="feePerMember" placeholder="Fee Per Member">

        <button id="btn7">Calculate</button>
        <p id="result7"></p>
    </div>

    <div class="box">
        <h2>8. Textbook Cost</h2>

        <input type="number" id="mathBook" placeholder="Math Book Cost">
        <input type="number" id="scienceBook" placeholder="Science Book Cost">
        <input type="number" id="englishBook" placeholder="English Book Cost">

        <button id="btn8">Calculate</button>
        <p id="result8"></p>
    </div>

    <div class="box">
        <h2>9. Workshop Cost</h2>

        <input type="number" id="materials" placeholder="Materials Cost">
        <input type="number" id="refreshments" placeholder="Refreshments Cost">
        <input type="number" id="honorarium" placeholder="Honorarium Cost">

        <button id="btn9">Calculate</button>
        <p id="result9"></p>
    </div>

    <!-- 10 -->
    <div class="box">
        <h2>10. Extra-Curricular Fee</h2>

        <input type="number" id="musicFee" placeholder="Music Fee">
        <input type="number" id="danceFee" placeholder="Dance Fee">
        <input type="number" id="dramaFee" placeholder="Drama Fee">

        <button id="btn10">Calculate</button>
        <p id="result10"></p>
    </div>

    <script src="simple.js"></script>

</body>
</html>
