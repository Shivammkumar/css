<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charging Station Management</title>
    <link rel="stylesheet" href="ev-charging.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>⚡ EV Charging Station</h1>
            <div class="user-info" id="userInfo" style="display: none;">
                <span>Welcome, <strong id="userName"></strong></span>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>
        </header>

        <!-- Auth Section -->
        <section id="authSection">
            <!-- Login Form -->
            <div class="auth-form" id="loginForm">
                <h2>Login</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                    <p class="switch-form">
                        Don't have an account? 
                        <a href="#" onclick="showRegister()">Register</a>
                    </p>
                </form>
            </div>

            <!-- Register Form -->
            <div class="auth-form" id="registerForm" style="display: none;">
                <h2>Register</h2>
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="regName" required placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" required placeholder="Create a password">
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="regConfirmPassword" required placeholder="Confirm your password">
                    </div>
                    <button type="submit" class="btn-primary">Register</button>
                    <p class="switch-form">
                        Already have an account? 
                        <a href="#" onclick="showLogin()">Login</a>
                    </p>
                </form>
            </div>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboardSection" style="display: none;">
            <div class="dashboard">
                <h2>📍 Charging Slots</h2>
                
                <!-- Legend -->
                <div class="legend">
                    <span class="legend-item"><span class="slot available"></span> Available</span>
                    <span class="legend-item"><span class="slot booked"></span> Booked</span>
                    <span class="legend-item"><span class="slot your-booking"></span> Your Booking</span>
                </div>

                <!-- Slots Grid -->
                <div class="slots-grid" id="slotsGrid">
                    <!-- Slots will be generated by JavaScript -->
                </div>

                <!-- My Bookings -->
                <div class="my-bookings">
                    <h3>📋 My Bookings</h3>
                    <div id="myBookingsList">
                        <!-- Bookings will be displayed here -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Message Display -->
        <div id="message" class="message"></div>
    </div>

    <script src="ev-charging.js"></script>
</body>
</html>
