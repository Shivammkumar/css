[8:57 AM, 3/1/2026] ChiPi Technologies Private Limited: <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Admission Form</title>
    <link rel="stylesheet" href="AdmissionForm1.css">
</head>
<body>
    <div class="container">
        <h1>College Admission Form</h1>
        <div id="admissionForm">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="email">Email ID:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="address">Address:</label>
                <textarea id="address" name="address" required></textarea>
            </div>
            <div class="form-group">
                <label for="pincode">Pin Code:</label>
                <input type="text" id="pincode" name="pincode" required>
            </div>
            <div class="form-group">
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob" required>
            </div>
            <div class="form-group">
                <label for="course">Course:</label>
                <select id="course" name="course" required>
                    <option value="btech">B.Tech</option>
                    <option value="bsc">B.Sc</option>
                    <option value="ba">B.A</option>
                    <option value="bcom">B.Com</option>
                </select>
            </div>
            <div class="form-group">
                <label for="gap">Gap in Academics (years):</label>
                <select id="gap" name="gap" required>
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>
            <div class="form-group">
                <label>Gender:</label>
                <label><input type="radio" name="gender" value="male" required> Male</label>
                <label><input type="radio" name="gender" value="female" required> Female</label>
                <label><input type="radio" name="gender" value="other" required> Other</label>
            </div>
            <div class="form-group">
                <label><input type="checkbox" id="terms" name="terms" required> I agree to the terms and conditions</label>
            </div>
            <div class="form-actions">
                <button type="button" id="validateButton">Validate</button>
                <button type="button" id="resetButton">Reset</button>
                <button type="button" id="showFormButton" disabled>Show Form</button>
            </div>
        </div>
        <textarea id="jsonOutput" style="display: none;" rows="10" readonly></textarea>
    </div>
    <script src="AdmissionForm1.js"></script>
</body>
</html>
