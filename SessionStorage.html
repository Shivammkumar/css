<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Session Storage Example</title>
    <link rel="stylesheet" href="SessionStorage.css">
    <script src="SessionStorage.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Session Storage Example</h1>
        <form id="profileForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            
            <button type="submit">Save</button>
        </form>
        
        <div class="buttons">
            <button id="retrieveBtn">Retrieve Data</button>
            <button id="clearBtn">Clear Data</button>
        </div>
        
        <div id="output"></div>
    </div>
</body>
</html>
