<!DOCTYPE html>
<html>
<head>
    <title>All Mouse Events</title>
    <link rel="stylesheet" href="AllEvents.css">
</head>
<body>

<h2>JavaScript Mouse Events Example</h2>

<button id="clickBtn">Click</button>
<button id="dblBtn">Double Click</button>
<button id="overBtn">Mouse Over</button>
<button id="outBtn">Mouse Out</button>
<button id="downBtn">Mouse Down</button>
<button id="upBtn">Mouse Up</button>
<button id="moveBtn">Mouse Move</button>
<button id="enterBtn">Mouse Enter</button>
<button id="leaveBtn">Mouse Leave</button>

<p id="msg">Event message will show here</p>

<h2>Keyboard Events</h2>

<button id="keydownBtn">keydown</button>
<button id="keyupBtn">keyup</button>
<button id="keypressBtn">Keypress</button>

<p id="mssg">Keyboard message will show here</p>

<script src="AllEvents.js"></script>
</body>
</html>
